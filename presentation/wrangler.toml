name = "markit-ai-presentation"
main = "worker.ts"
compatibility_date = "2026-07-11"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 0.1
