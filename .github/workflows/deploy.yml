name: Verify and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: markit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-deploy:
    name: Verify and optionally deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: 'true'
      WRANGLER_SEND_METRICS: 'false'
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install latest Bun canary
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-canary-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-canary-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Apply production database migrations
        if: github.event_name != 'pull_request'
        run: bun x wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy production Worker
        if: github.event_name != 'pull_request'
        run: bun x wrangler deploy -c dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
